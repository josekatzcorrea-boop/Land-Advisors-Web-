name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (landing/ as root)
        run: |
          node landing/scripts/build-seo.mjs
          mkdir -p _site/assets
          rsync -a \
            --exclude 'Imágenes/' \
            --exclude 'Imagenes/' \
            --exclude 'video/' \
            --exclude 'kmz-extract/' \
            --exclude 'seo/' \
            --exclude 'scripts/' \
            --exclude '*.ps1' \
            --exclude '*.md' \
            --exclude 'filelist.txt' \
            --exclude 'maps-config.example.js' \
            landing/ _site/
          cp assets/logo-horizontal.png assets/logo-isotipo.png _site/assets/
          find _site -name '*.html' -exec sed -i 's|\.\./assets/|assets/|g' {} +
          echo 'www.landadvisors.cl' > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
